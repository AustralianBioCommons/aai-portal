name: release-please-build-upload

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      body: ${{ steps.release.outputs.body }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish-release-builds:
    name: Build And Upload Portal Release Artifacts
    needs: release
    if: needs.release.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.tag_name }}

      - name: Normalize version
        id: version
        env:
          TAG_NAME: ${{ needs.release.outputs.tag_name }}
        run: |
          set -euo pipefail
          NORMALIZED_VERSION=${TAG_NAME#aai-portal-v}
          NORMALIZED_VERSION=${NORMALIZED_VERSION#v}
          echo "version=${NORMALIZED_VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npx ng build --configuration production --output-path dist/aai-portal-prod

      - name: Build debug bundle
        run: npx ng build --configuration debug --output-path dist/aai-portal-debug

      - name: Validate required secrets
        env:
          AWS_PORTAL_BUILD_BUCKET: ${{ secrets.AWS_PORTAL_BUILD_BUCKET }}
          AWS_ROLE_FRONTEND: ${{ secrets.AWS_ROLE_FRONTEND }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          set -euo pipefail
          if [ -z "${AWS_PORTAL_BUILD_BUCKET}" ]; then
            echo "Missing required secret AWS_PORTAL_BUILD_BUCKET" >&2
            exit 1
          fi
          if [ -z "${AWS_ROLE_FRONTEND}" ]; then
            echo "Missing required secret AWS_ROLE_FRONTEND" >&2
            exit 1
          fi
          if [ -z "${AWS_REGION}" ]; then
            echo "Missing required secret AWS_REGION" >&2
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_FRONTEND }}
          role-session-name: portal-release-upload
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload production versioned build
        env:
          NORMALIZED_VERSION: ${{ steps.version.outputs.version }}
          AWS_PORTAL_BUILD_BUCKET: ${{ secrets.AWS_PORTAL_BUILD_BUCKET }}
        run: |
          set -euo pipefail
          aws s3 sync dist/aai-portal-prod/browser/ "s3://${AWS_PORTAL_BUILD_BUCKET}/build/prod/version/${NORMALIZED_VERSION}/" --delete

      - name: Upload debug versioned build
        env:
          NORMALIZED_VERSION: ${{ steps.version.outputs.version }}
          AWS_PORTAL_BUILD_BUCKET: ${{ secrets.AWS_PORTAL_BUILD_BUCKET }}
        run: |
          set -euo pipefail
          aws s3 sync dist/aai-portal-debug/browser/ "s3://${AWS_PORTAL_BUILD_BUCKET}/build/debug/version/${NORMALIZED_VERSION}/" --delete

  notify-jira:
    name: Tag JIRA Tickets for Release
    needs: release
    if: needs.release.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Tag JIRA tickets with fix version
        env:
          JIRA_BASE_URL: https://biocloud.atlassian.net
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          RELEASE_TAG: ${{ needs.release.outputs.tag_name }}
          RELEASE_BODY: ${{ needs.release.outputs.body }}
        run: |
          python3 - <<'PYEOF'
          import os, re, json, urllib.request, urllib.error, base64

          base_url = os.environ['JIRA_BASE_URL']
          tag = os.environ['RELEASE_TAG']
          auth = base64.b64encode(
              f"{os.environ['JIRA_USER_EMAIL']}:{os.environ['JIRA_API_TOKEN']}".encode()
          ).decode()
          headers = {
              'Authorization': f'Basic {auth}',
              'Content-Type': 'application/json',
              'Accept': 'application/json',
          }

          def jira(method, path, body=None):
              url = f"{base_url}/rest/api/3{path}"
              data = json.dumps(body).encode() if body else None
              req = urllib.request.Request(url, data=data, headers=headers, method=method)
              try:
                  with urllib.request.urlopen(req) as r:
                      text = r.read()
                      return json.loads(text) if text else None
              except urllib.error.HTTPError as e:
                  print(f"  WARN {e.code} {method} {path}: {e.read().decode()[:200]}")
                  return None

          tickets = sorted(set(re.findall(r'AAI-\d+', os.environ['RELEASE_BODY'])))
          if not tickets:
              print("No AAI-* tickets found in release notes — nothing to tag.")
              raise SystemExit(0)
          print(f"Tickets in {tag}: {', '.join(tickets)}")

          project = jira('GET', '/project/AAI')
          if not project:
              raise SystemExit("ERROR: could not fetch AAI project from JIRA")

          versions = jira('GET', '/project/AAI/versions') or []
          existing = next((v for v in versions if v['name'] == tag), None)
          if existing:
              version_id = existing['id']
              print(f"Reusing existing JIRA version '{tag}' (id={version_id})")
          else:
              created = jira('POST', '/version', {
                  'name': tag,
                  'projectId': project['id'],
                  'released': True,
              })
              if not created:
                  raise SystemExit("ERROR: could not create JIRA version")
              version_id = created['id']
              print(f"Created JIRA version '{tag}' (id={version_id})")

          for ticket in tickets:
              issue = jira('GET', f'/issue/{ticket}?fields=fixVersions,summary')
              if not issue:
                  print(f"  SKIP {ticket}: issue not found or inaccessible")
                  continue
              current = issue['fields'].get('fixVersions', [])
              if any(v['id'] == version_id for v in current):
                  print(f"  SKIP {ticket}: already tagged with {tag}")
                  continue
              jira('PUT', f'/issue/{ticket}', {
                  'fields': {'fixVersions': current + [{'id': version_id}]}
              })
              print(f"  DONE {ticket}: {issue['fields'].get('summary', '')[:60]}")

          print(f"\nTagged {len(tickets)} ticket(s) with fix version '{tag}'.")
          PYEOF
